services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: abacus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d abacus"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-1:
    build: .
    environment:
      ABACUS_DB_URL: postgresql+psycopg://postgres:postgres@postgres:5432/abacus
      ABACUS_NODE_NAME: api-1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-2:
    build: .
    environment:
      ABACUS_DB_URL: postgresql+psycopg://postgres:postgres@postgres:5432/abacus
      ABACUS_NODE_NAME: api-2
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 10
